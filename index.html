<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samir</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b0014;
color:white;
text-align:center;
}

.container{
padding:30px;
}

.profile{
width:140px;
height:140px;
border-radius:50%;
border:5px solid #a100ff;
margin:auto;
overflow:hidden;
box-shadow:0 0 30px #a100ff;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

h1{
margin-top:20px;
font-size:40px;
color:#c86cff;
text-shadow:0 0 20px #a100ff;
}

.tag{
font-size:18px;
margin-bottom:30px;
}

.btn{
display:block;
width:280px;
margin:20px auto;
padding:18px;
border-radius:15px;
background:linear-gradient(90deg,#7a00ff,#c200ff);
color:white;
text-decoration:none;
font-size:22px;
font-weight:bold;
box-shadow:0 0 20px #8a00ff;
}
</style>
</head>

<body>

<div class="container">

<div class="profile">
<img src="https://i.imgur.com/2DhmtJ4.jpeg">
</div>

<h1>VORTX</h1>

<p class="tag">MASTER YOUR MOTION</p>

<a class="btn" href="#">🛒 Online Store</a>

<a class="btn" href="#">🎵 TikTok</a>

<a class="btn" href="#">▶ YouTube</a>

</div>

</body>
</html>
